<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Megi</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260612-centered-toast" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-lockup" aria-label="My Megi">
          <img class="brand-logo" src="/static/assets/my-megi-logo.png?v=20260612-calligraphy-small" alt="My Megi" />
          <span class="app-version" data-app-version>v0.1.1</span>
        </div>
        <p>名片與人脈資料庫</p>
      </div>
      <section class="status-grid" aria-label="Dashboard">
        <article class="metric">
          <span>聯絡人</span>
          <strong id="metric-contacts">0</strong>
        </article>
        <article class="metric">
          <span>公司</span>
          <strong id="metric-companies">0</strong>
        </article>
        <article class="metric">
          <span>名片</span>
          <strong id="metric-cards">0</strong>
        </article>
        <article class="metric attention">
          <span>待處理</span>
          <strong id="metric-pending">0</strong>
        </article>
      </section>
      <nav aria-label="Primary" class="top-actions">
        <button class="nav-icon is-active" type="button" data-main-tab="upload" title="上傳" aria-label="上傳">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 16V4m0 0 5 5m-5-5-5 5"/><path d="M5 16v2.5A1.5 1.5 0 0 0 6.5 20h11a1.5 1.5 0 0 0 1.5-1.5V16"/></svg>
        </button>
        <button class="nav-icon" type="button" data-main-tab="contacts" title="聯絡人" aria-label="聯絡人">
          <svg aria-hidden="true" viewBox="0 0 24 24"><rect x="3.5" y="5.5" width="17" height="13" rx="2"/><path d="M8 10h4.5"/><path d="M8 13.5h8"/><circle cx="16.5" cy="10" r="1.6"/></svg>
        </button>
        <a class="nav-icon" href="/docs" title="API" aria-label="API">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m8 8-4 4 4 4"/><path d="m16 8 4 4-4 4"/><path d="m14 5-4 14"/></svg>
        </a>
      </nav>
    </header>

    <main>
      <section class="workspace main-panel" id="upload-panel" data-main-panel="upload">
        <div class="panel upload-panel" id="upload">
          <div class="panel-title">
            <h2>名片上傳</h2>
            <span id="upload-state">待命</span>
          </div>
          <form id="upload-form">
            <div class="file-row">
              <label class="file-drop" data-drop-zone="front">
                <input id="card-file" name="file" type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif,image/heic-sequence,image/heif-sequence,application/pdf" required />
                <span class="file-title">選擇名片正面</span>
                <span class="file-meta" id="file-meta">JPG、PNG、WEBP、HEIC、HEIF、PDF，最大 20MB</span>
              </label>
              <label class="file-drop secondary-drop" data-drop-zone="back">
                <input id="card-back-file" name="backFile" type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif,image/heic-sequence,image/heif-sequence,application/pdf" />
                <span class="file-title">選擇名片背面</span>
                <span class="file-meta" id="back-file-meta">選填，最多再加一張</span>
              </label>
            </div>

            <div class="field-grid">
              <label>
                <span>認識場合</span>
                <input name="metAt" type="text" placeholder="2026 Taipei Expo" />
              </label>
              <label>
                <span>日期</span>
                <input name="metOn" type="date" />
              </label>
            </div>

            <label>
              <span>備註</span>
              <textarea name="note" rows="4" placeholder="由誰介紹、聊了什麼、下一步"></textarea>
            </label>

            <button type="submit" id="upload-submit">上傳名片</button>
          </form>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>最近匯入</h2>
            <button class="ghost" type="button" id="refresh-cards">重新整理</button>
          </div>
          <div class="tabs" role="tablist" aria-label="最近匯入狀態">
            <button class="tab is-active" type="button" role="tab" aria-selected="true" data-card-tab="pending">未審核</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-card-tab="completed">已審核</button>
          </div>
          <div class="list" id="cards-list"></div>
        </div>
      </section>

      <section class="main-panel" id="contacts-panel" data-main-panel="contacts" hidden>
        <div class="panel contacts-panel" id="contacts">
          <div class="panel-title">
            <h2 id="contacts-title">聯絡人</h2>
            <form class="search" id="contact-search">
              <input name="q" type="search" placeholder="搜尋姓名、公司、Email、電話" />
              <input name="companyClassification" type="search" placeholder="公司分類" />
              <input name="regionClassification" type="search" placeholder="地區分類" />
              <input name="industryClassification" type="search" placeholder="產業分類" />
              <button type="submit">搜尋</button>
            </form>
          </div>
          <div class="table-wrap">
            <table>
              <colgroup>
                <col class="contacts-col-name" />
                <col class="contacts-col-company" />
                <col class="contacts-col-title" />
                <col class="contacts-col-classification" />
                <col class="contacts-col-date" />
                <col class="contacts-col-actions" />
              </colgroup>
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>公司</th>
                  <th>職稱</th>
                  <th>分類</th>
                  <th>建立時間</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="contacts-body"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>開發者：Louis Chuang</span>
      <span>Copyright: 2026</span>
      <span>版本號：<span data-app-version>v0.1.1</span></span>
    </footer>

    <div class="modal" id="review-modal" hidden>
      <div class="modal-backdrop" data-close-modal="review"></div>
      <section class="panel review-panel modal-panel" id="review" role="dialog" aria-modal="true" aria-labelledby="review-title">
        <div class="panel-title">
          <div>
            <h2 id="review-title">名片審核</h2>
            <span id="review-state">未選取</span>
          </div>
            <button class="bare-icon" type="button" data-close-modal="review" title="關閉" aria-label="關閉">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
            </button>
        </div>
        <div class="review-empty" id="review-empty">從最近匯入選擇一張名片進行審核</div>
        <div class="review-workbench" id="review-workbench" hidden>
            <div class="evidence-column">
            <div class="card-preview-grid" id="card-preview"></div>
            <label>
              <span>OCR 文字</span>
              <textarea id="ocr-text" rows="9" readonly></textarea>
            </label>
          </div>
          <form id="review-form">
            <input name="cardId" type="hidden" />
            <input name="contactId" type="hidden" />
            <div class="field-grid">
              <label>
                <span>姓名中文</span>
                <input name="name" type="text" required />
              </label>
              <label>
                <span>姓名英文</span>
                <input name="englishName" type="text" />
              </label>
            </div>
            <div class="field-grid">
              <label>
                <span>職稱</span>
                <input name="title" type="text" />
              </label>
              <label>
                <span>公司中文</span>
                <input name="companyName" type="text" />
              </label>
              <label>
                <span>公司英文</span>
                <input name="companyEnglishName" type="text" />
              </label>
            </div>
            <div class="field-grid three">
              <label>
                <span>Email</span>
                <input name="emails" type="text" />
              </label>
              <label>
                <span>手機</span>
                <input name="mobiles" type="text" />
              </label>
              <label>
                <span>電話</span>
                <input name="phones" type="text" />
              </label>
            </div>
            <div class="field-grid three">
              <label>
                <span>傳真</span>
                <input name="fax" type="text" />
              </label>
              <label>
                <span>統編</span>
                <input name="taxId" type="text" />
              </label>
              <label>
                <span>產業</span>
                <input name="industry" type="text" />
              </label>
            </div>
            <label>
              <span>地址中文</span>
              <input name="addressRaw" type="text" />
            </label>
            <label>
              <span>地址英文</span>
              <input name="addressEnglishRaw" type="text" />
            </label>
            <div class="field-grid three">
              <label>
                <span>國家</span>
                <input name="country" type="text" />
              </label>
              <label>
                <span>城市</span>
                <input name="city" type="text" />
              </label>
              <label>
                <span>行政區</span>
                <input name="district" type="text" />
              </label>
            </div>
            <div class="field-grid three">
              <label>
                <span>公司分類</span>
                <input name="companyClassifications" type="text" />
              </label>
              <label>
                <span>地區分類</span>
                <input name="regionClassifications" type="text" />
              </label>
              <label>
                <span>產業分類</span>
                <input name="industryClassifications" type="text" />
              </label>
            </div>
            <div class="field-grid">
              <label>
                <span>認識場合</span>
                <input name="metAt" type="text" />
              </label>
              <label>
                <span>日期</span>
                <input name="metOn" type="date" />
              </label>
            </div>
            <label>
              <span>認識備註</span>
              <textarea name="note" rows="3"></textarea>
            </label>
            <label>
              <span>名片額外備註</span>
              <textarea name="extraNotes" rows="3"></textarea>
            </label>
            <button type="submit">儲存為聯絡人</button>
          </form>
        </div>
      </section>
    </div>

    <div class="modal" id="contact-detail-modal" hidden>
      <div class="modal-backdrop" data-close-modal="contact-detail"></div>
      <section class="panel contact-detail-panel modal-panel" role="dialog" aria-modal="true" aria-labelledby="contact-detail-title">
        <div class="panel-title">
          <h2 id="contact-detail-title">聯絡人資訊</h2>
          <div class="modal-actions">
            <button class="bare-icon" type="button" id="contact-edit-button" title="編輯" aria-label="編輯">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m4 20 4.4-1 10.1-10.1a2.1 2.1 0 0 0-3-3L5.4 16 4 20Z"/><path d="m14 7 3 3"/></svg>
            </button>
            <button class="bare-icon" type="button" data-close-modal="contact-detail" title="關閉" aria-label="關閉">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
            </button>
          </div>
        </div>
        <div class="detail-grid" id="contact-detail"></div>
      </section>
    </div>

    <div class="toast" id="upload-toast" hidden>
      <button class="toast-close" type="button" id="upload-toast-close" title="關閉" aria-label="關閉">×</button>
      <strong>已完成上傳與辨識</strong>
      <span id="upload-toast-message">辨識度 未評估</span>
    </div>

    <script src="/static/app.js?v=20260612-centered-toast" type="module"></script>
  </body>
</html>
